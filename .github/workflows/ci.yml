name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: shellcheck -x ccbar ccbar-header.sh ccbar-dashboard.sh ccbar-bar.sh ccbar-panel.sh ccbar-cmux.sh claude_status.sh

      - name: Python syntax check
        run: python3 -m py_compile ccbar_parse.py
